name: Python Unit Test + Code Coverage

on:
  push:
    branches:
      - python/pre_release
  pull_request: {}

jobs:
  build-linux:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      max-parallel: 5

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --no-install-project --all-extras

    - name: Lint with ruff
      run: |
        uv run ruff check
        uv run ruff format --check

    - name: Test with pytest
      run: |
        set -o pipefail
        uv run pytest tests -v --cov=src --cov-fail-under=85 --junitxml=pytest.xml --cov-report=term-missing:skip-covered | tee pytest-coverage.txt

    - name: Pytest coverage comment
      if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
      id: coverageComment
      uses: MishaKav/pytest-coverage-comment@v1.2.0
      with:
        pytest-coverage-path: ./pytest-coverage.txt
        junitxml-path: ./pytest.xml

    - name: Save coverage HTML
      if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
      env:
        COVERAGE_HTML: ${{ steps.coverageComment.outputs.coverageHtml }}
      run: printf '%s\n' "$COVERAGE_HTML" > coverage.html

    - name: Upload coverage artifacts
      if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          pytest-coverage.txt
          pytest.xml
          coverage.html
